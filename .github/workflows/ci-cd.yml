name: Expense Tracker CI/CD (Windows)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis
        ports:
          - 6379:6379

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.13"

      - name: Install backend dependencies
        run: |
          cd expense_tracker
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run backend tests
        run: |
          cd expense_tracker
          python manage.py test

  frontend:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "24"

      - name: Install frontend dependencies
        run: |
          cd react-frontend
          npm install

      - name: Run frontend tests
        run: |
          cd react-frontend
          npx vitest run

      - name: Build frontend
        run: |
          cd react-frontend
          npm run build