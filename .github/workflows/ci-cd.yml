name: Expense Tracker CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379

      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U testuser -d testdb"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://testuser:testpass@localhost:5432/testdb
      SECRET_KEY: github-ci-secret-key

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.13"

      - name: Install backend dependencies
        run: |
          cd expense_tracker
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Wait for Postgres
        run: |
          for i in {1..20}; do
            pg_isready -h postgres -U testuser -d testdb && break
            echo "Waiting for Postgres..."
            sleep 2
          done

      - name: Run backend tests
        run: |
          cd expense_tracker
          python manage.py test

  frontend:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "24"

      - name: Install frontend dependencies
        run: |
          cd react-frontend
          npm install

      - name: Run frontend tests
        run: |
          cd react-frontend
          npx vitest run

      - name: Build frontend
        run: |
          cd react-frontend
          npm run build